name: Sync from Upstream

env:
  UPSTREAM_REPO: capawesome-team/capacitor-firebase
  DEFAULT_UPSTREAM_BRANCH: main

on:
  schedule:
    # Run every day at 9 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Upstream branch to sync from'
        required: false
        default: 'main'

jobs:
  sync:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    name: "Sync changes from upstream repository"
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          filter: blob:none
          token: '${{ secrets.PERSONAL_ACCESS_TOKEN }}'

      - name: Configure Git
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/${{ env.UPSTREAM_REPO }}.git || true
          git fetch upstream

      - name: Check for upstream changes
        id: check_changes
        run: |
          UPSTREAM_BRANCH="${{ github.event.inputs.branch || env.DEFAULT_UPSTREAM_BRANCH }}"
          git fetch upstream $UPSTREAM_BRANCH

          # Check if there are new commits
          LOCAL_COMMIT=$(git rev-parse HEAD)
          UPSTREAM_COMMIT=$(git rev-parse upstream/$UPSTREAM_BRANCH)

          if [ "$LOCAL_COMMIT" = "$UPSTREAM_COMMIT" ]; then
            echo "No new changes from upstream"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "New changes detected from upstream"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "upstream_commit=$UPSTREAM_COMMIT" >> $GITHUB_OUTPUT
          fi

      - name: Create sync branch
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          BRANCH_NAME="sync-upstream-$(date +%Y%m%d-%H%M%S)"
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME

      - name: Setup Bun
        if: steps.check_changes.outputs.has_changes == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install Claude Code
        if: steps.check_changes.outputs.has_changes == 'true'
        run: bun add -g @anthropic-ai/claude-code

      - name: Ensure sync labels exist
        if: steps.check_changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          source .github/scripts/sync-gh-helpers.sh
          ensure_sync_labels "${GITHUB_REPOSITORY}"

      - name: Merge upstream changes
        if: steps.check_changes.outputs.has_changes == 'true'
        id: merge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail

          UPSTREAM_BRANCH="${{ github.event.inputs.branch || env.DEFAULT_UPSTREAM_BRANCH }}"
          MERGE_MESSAGE="chore: sync from upstream ${{ env.UPSTREAM_REPO }}"

          if git merge "upstream/$UPSTREAM_BRANCH" --no-edit -m "$MERGE_MESSAGE"; then
            echo "merge_status=success" >> $GITHUB_OUTPUT
            echo "resolution_mode=clean" >> $GITHUB_OUTPUT
            echo "ai_status=not-needed" >> $GITHUB_OUTPUT
            echo "✅ Merge successful"
            exit 0
          fi

          if ! git diff --name-only --diff-filter=U | grep -q .; then
            echo "Merge failed without unresolved conflicts"
            exit 1
          fi

          echo "⚠️ Merge conflicts detected"
          CONFLICTS=$(git diff --name-only --diff-filter=U)
          echo "conflicts<<EOF" >> $GITHUB_OUTPUT
          echo "$CONFLICTS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ -n "${ANTHROPIC_API_KEY:-}" ] && bash .github/scripts/resolve-conflicts-with-claude.sh main "upstream/$UPSTREAM_BRANCH" "scheduled upstream sync"; then
            git commit -m "$MERGE_MESSAGE (claude-resolved conflicts)"
            echo "merge_status=success" >> $GITHUB_OUTPUT
            echo "resolution_mode=claude" >> $GITHUB_OUTPUT
            echo "ai_status=resolved" >> $GITHUB_OUTPUT
            echo "✅ Claude resolved merge conflicts"
          else
            if [ -z "${ANTHROPIC_API_KEY:-}" ]; then
              echo "ai_status=skipped-no-key" >> $GITHUB_OUTPUT
            else
              echo "ai_status=failed" >> $GITHUB_OUTPUT
            fi
            git merge --abort
            echo "merge_status=conflict" >> $GITHUB_OUTPUT
            echo "resolution_mode=manual" >> $GITHUB_OUTPUT
          fi

      - name: Push sync branch
        if: steps.check_changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_status == 'success'
        run: |
          git push origin ${{ env.branch_name }}

      - name: Create Pull Request
        if: steps.check_changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_status == 'success'
        id: create_pr
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          RESOLUTION_MODE: ${{ steps.merge.outputs.resolution_mode }}
        run: |
          set -euo pipefail

          source .github/scripts/sync-gh-helpers.sh

          if [ "$RESOLUTION_MODE" = "claude" ]; then
            RESOLUTION_NOTES=$(cat <<'EOF'
          ### Conflict Resolution
          - Git detected merge conflicts while syncing upstream changes
          - Claude Code resolved the conflicted files before this PR was created
          EOF
          )
          else
            RESOLUTION_NOTES=$(cat <<'EOF'
          ### Conflict Resolution
          - No merge conflicts required AI assistance
          EOF
          )
          fi

          PR_BODY=$(cat <<EOF
          ## 🔄 Upstream Sync

          This PR syncs changes from the upstream repository [${{ env.UPSTREAM_REPO }}](https://github.com/${{ env.UPSTREAM_REPO }}).

          ### Changes Included
          - Latest commits from upstream \`${{ github.event.inputs.branch || env.DEFAULT_UPSTREAM_BRANCH }}\` branch
          - Upstream commit: \`${{ steps.check_changes.outputs.upstream_commit }}\`

          ${RESOLUTION_NOTES}

          ### Automated Process
          - ✅ Tests will run automatically
          - ✅ Auto-merge is enabled once checks pass
          - 🤖 Generated by GitHub Actions

          ---
          *Created by the upstream sync workflow*
          EOF
          )

          PR_NUMBER="$(create_pr_and_capture_number "${GITHUB_REPOSITORY}" "main" "${{ env.branch_name }}" "chore: sync from upstream ${{ env.UPSTREAM_REPO }}" "$PR_BODY" || true)"

          if [ -z "$PR_NUMBER" ]; then
            {
              echo "## ⚠️ Pull request creation needs manual follow-up"
              echo
              echo "The sync branch \`${{ env.branch_name }}\` was pushed successfully, but the workflow could not create or find a pull request."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          add_labels_to_pr "${GITHUB_REPOSITORY}" "$PR_NUMBER" upstream-sync automated || true
          echo "pull_request_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge
        if: steps.check_changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_status == 'success' && steps.create_pr.outputs.pull_request_number
        run: |
          gh pr merge ${{ steps.create_pr.outputs.pull_request_number }} --auto --squash || {
            echo "Auto-merge could not be enabled for PR #${{ steps.create_pr.outputs.pull_request_number }}" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          }
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Report unresolved conflicts
        if: steps.check_changes.outputs.has_changes == 'true' && steps.merge.outputs.merge_status == 'conflict'
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          AI_STATUS: ${{ steps.merge.outputs.ai_status }}
        run: |
          set -euo pipefail

          source .github/scripts/sync-gh-helpers.sh
          ensure_sync_labels "${GITHUB_REPOSITORY}"

          if [ "$AI_STATUS" = "skipped-no-key" ]; then
            AI_LINE="- Claude Code could not run because \`ANTHROPIC_API_KEY\` is not configured"
          elif [ "$AI_STATUS" = "failed" ]; then
            AI_LINE="- Claude Code attempted the conflict resolution but could not finish cleanly"
          else
            AI_LINE="- Claude Code was not able to resolve the conflicts automatically"
          fi

          ISSUE_BODY=$(cat <<EOF
          ## ⚠️ Upstream sync needs manual conflict resolution

          An automatic sync from [${{ env.UPSTREAM_REPO }}](https://github.com/${{ env.UPSTREAM_REPO }}) encountered merge conflicts.

          ### Conflicting Files
          \`\`\`
          ${{ steps.merge.outputs.conflicts }}
          \`\`\`

          ### AI Resolution Attempt
          ${AI_LINE}

          ### Sync Details
          - Upstream branch: \`${{ github.event.inputs.branch || env.DEFAULT_UPSTREAM_BRANCH }}\`
          - Upstream commit: \`${{ steps.check_changes.outputs.upstream_commit }}\`
          - Attempted branch name: \`${{ env.branch_name }}\`

          ### Action Required
          1. Check out \`main\` locally
          2. Merge the upstream commit
          3. Resolve the listed conflicts and open a PR
          EOF
          )

          ISSUE_NUMBER="$(create_or_update_conflict_issue "${GITHUB_REPOSITORY}" "⚠️ Upstream sync requires manual conflict resolution" "$ISSUE_BODY" || true)"

          if [ -n "$ISSUE_NUMBER" ]; then
            echo "Created or updated issue #$ISSUE_NUMBER"
            exit 0
          fi

          {
            echo "## ⚠️ Upstream sync needs manual conflict resolution"
            echo
            echo "The workflow could not open an issue automatically. Details are below."
            echo
            echo "$ISSUE_BODY"
          } >> "$GITHUB_STEP_SUMMARY"
