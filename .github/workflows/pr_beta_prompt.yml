name: Firebase PR beta publish prompt

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  comment:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          filter: blob:none

      - name: Upsert beta publish comment
        uses: actions/github-script@v8
        env:
          IS_SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository && 'true' || 'false' }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const marker = '<!-- pr-beta-publish -->';
            const sameRepo = process.env.IS_SAME_REPO === 'true';
            const pr = context.payload.pull_request;

            const packagesRoot = path.join(process.cwd(), 'packages');
            const packageLines = fs.readdirSync(packagesRoot, { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => {
                const packagePath = path.join(packagesRoot, entry.name, 'package.json');
                if (!fs.existsSync(packagePath)) return null;
                const pkg = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
                return `- \`${entry.name}\` (${pkg.name})`;
              })
              .filter(Boolean)
              .sort();

            const body = sameRepo
              ? [
                  marker,
                  '',
                  '## Beta npm build',
                  '',
                  'Maintainers can publish a Firebase workspace package from this PR to npm for fast testing.',
                  '',
                  'Comment `/publish-beta <package>` after the PR checks are green.',
                  '',
                  'Examples:',
                  '```sh',
                  '/publish-beta analytics',
                  '/publish-beta packages/analytics',
                  '/publish-beta @capgo/capacitor-firebase-analytics',
                  '```',
                  '',
                  'If exactly one package changed, `/publish-beta` without a package will use that package.',
                  '',
                  'Packages:',
                  ...packageLines,
                  '',
                  'The workflow will:',
                  '- publish a prerelease package on the `beta` tag',
                  `- add a pinned \`pr-${pr.number}\` dist-tag for the selected package`,
                  '- update this comment with the install command',
                  '',
                  'Security note: beta publish is only enabled for branches inside this repository.',
                ].join('\n')
              : [
                  marker,
                  '',
                  '## Beta npm build',
                  '',
                  'This PR comes from a fork, so beta publish is disabled for security.',
                  '',
                  'If you need a beta package, move the branch into this repository first.',
                ].join('\n');

            const { owner, repo } = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pr.number,
              per_page: 100,
            });

            const existing = comments.find((comment) => comment.user.type === 'Bot' && comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              return;
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body,
            });
